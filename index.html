<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Central Chic Manager</title>
<meta name="theme-color" content="#111111">
<link rel="manifest" href="manifest.webmanifest">
<style>
:root{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f4f5f7;color:#111}
*{box-sizing:border-box} body{margin:0;padding:16px;max-width:560px;margin:auto}
h1{font-size:25px;margin:8px 0 2px}.sub{font-size:13px;color:#666}.card{background:#fff;border-radius:20px;padding:16px;margin:14px 0;box-shadow:0 2px 14px #0001}
h2{font-size:18px;margin:0 0 12px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
button{border:0;border-radius:15px;padding:14px 12px;font-weight:800;font-size:16px;background:#111;color:#fff}
button.light{background:#e9eaee;color:#111}button.good{background:#087a2b}button.danger{background:#b00020}
.notice{text-align:center;font-size:20px;font-weight:900;padding:18px;border-radius:18px}.red{background:#ffd7dd;color:#850018}.green{background:#ddf5e4;color:#075d23}.yellow{background:#fff0c2;color:#7a5100}
.row{display:flex;justify-content:space-between;gap:10px;align-items:center;border-bottom:1px solid #eee;padding:11px 0}.row:last-child{border-bottom:0}
.name{font-weight:750}.small{font-size:13px;color:#666}.qty{font-size:24px;font-weight:900}.ok{color:#087a2b}.bad{color:#b00020}.mid{color:#9a6200}
input,textarea{width:100%;border:1px solid #ccc;border-radius:12px;padding:11px;font-size:16px} textarea{min-height:75px}
.tabs{position:sticky;bottom:0;background:#fff;border-radius:20px;padding:8px;margin-top:16px;box-shadow:0 -2px 18px #0002;display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.tabs button{font-size:13px;padding:10px 4px;border-radius:12px;background:#eee;color:#111}.tabs button.active{background:#111;color:#fff}.hidden{display:none}
#lock{position:fixed;inset:0;background:#f4f5f7;z-index:9999;display:flex;align-items:center;justify-content:center;padding:18px}
#lock .box{background:#fff;border-radius:22px;padding:22px;width:100%;max-width:420px;box-shadow:0 2px 20px #0002}.err{color:#b00020;font-weight:800}
</style>
</head>
<body>
<div id="lock"><div class="box">
<h1>🔐 Central Chic</h1><div class="sub">Wpisz hasło do panelu.</div>
<input id="pass" type="password" placeholder="Hasło" onkeydown="if(event.key==='Enter') unlock()">
<button style="width:100%;margin-top:10px" onclick="unlock()">Wejdź</button><p id="err" class="err"></p>
</div></div>

<h1>🏠 Central Chic Manager</h1>
<div class="sub">Pościel, ręczniki, pralnia, sprzątanie i zapasy. Dane zapisują się na tym urządzeniu.</div>

<section id="home">
<div id="alert" class="notice card">Ładuję...</div>
<div class="card"><h2>Nowy pobyt</h2><div class="grid">
<button onclick="stay(1)">1 gość</button><button onclick="stay(2)">2 gości</button>
<button onclick="stay(3)">3 gości</button><button onclick="stay(4)">4 gości</button>
</div></div>
<div class="card"><h2>Szybkie akcje</h2>
<button class="good" style="width:100%" onclick="laundry()">✅ Odebrano z pralni — pełny stan</button><br><br>
<button class="light" style="width:100%" onclick="doneClean()">🧹 Sprzątanie wykonane</button>
</div>
<div class="card"><h2>Podsumowanie</h2><div id="summary"></div></div>
</section>

<section id="stock" class="hidden">
<div class="card"><h2>Tekstylia</h2><div id="textiles"></div></div>
<div class="card"><h2>Zapasy</h2><div id="supplies"></div></div>
</section>

<section id="edit" class="hidden">
<div class="card"><h2>Korekta tekstyliów</h2><div id="editTextiles"></div><button style="width:100%" onclick="saveTextiles()">Zapisz</button></div>
<div class="card"><h2>Korekta zapasów</h2><div id="editSupplies"></div><button style="width:100%" onclick="saveSupplies()">Zapisz</button></div>
</section>

<section id="history" class="hidden">
<div class="card"><h2>Notatka</h2><textarea id="note" placeholder="Np. plama, brak ręcznika, uwagi dla sprzątania..."></textarea><button class="light" onclick="saveNote()">Zapisz notatkę</button></div>
<div class="card"><h2>Historia</h2><div id="hist"></div></div>
<div class="card"><button class="danger" style="width:100%" onclick="resetAll()">Reset wszystkiego</button></div>
</section>

<div class="tabs">
<button id="bh" class="active" onclick="tab('home','bh')">Panel</button>
<button id="bs" onclick="tab('stock','bs')">Stan</button>
<button id="be" onclick="tab('edit','be')">Korekta</button>
<button id="bhi" onclick="tab('history','bhi')">Historia</button>
</div>

<script>
const APP_PASSWORD="1234";
function unlock(){ if(document.getElementById('pass').value===APP_PASSWORD){sessionStorage.setItem('ok','1');document.getElementById('lock').style.display='none'} else document.getElementById('err').innerText='Złe hasło';}
if(sessionStorage.getItem('ok')==='1') document.getElementById('lock').style.display='none';

const TD=[["duvets","Poszwy 140×200",16,4,4,2],["pillow","Poszewki 50×70",20,8,8,2],["sheet","Prześcieradła 180×240",10,2,2,1],["big","Ręczniki 70×140",16,4,4,2],["small","Ręczniki 50×100",16,4,4,2]];
const SD=[["coffee","Kapsułki kawy",40,10],["paper","Papier toaletowy",12,4],["cosm","Kosmetyki / mydło",4,1],["bags","Worki na śmieci",20,5],["tabs","Tabletki do zmywarki",20,5]];
function load(k,d){let x=JSON.parse(localStorage.getItem(k)||"null"); if(!x){x={};d.forEach(i=>x[i[0]]=i[2]);localStorage.setItem(k,JSON.stringify(x))} return x}
let T=load("T",TD), S=load("S",SD), H=JSON.parse(localStorage.getItem("H")||"[]");
function save(){localStorage.setItem("T",JSON.stringify(T));localStorage.setItem("S",JSON.stringify(S));localStorage.setItem("H",JSON.stringify(H))}
function addH(t){H.unshift(new Date().toLocaleString("pl-PL")+" — "+t);H=H.slice(0,80);save()}
function f4(){return Math.min(...TD.map(i=>Math.floor(T[i[0]]/i[4])))} function f2(){return Math.min(...TD.map(i=>Math.floor(T[i[0]]/i[5])))}
function use(g){return {duvets:g,pillow:g,sheet:g<=2?1:2,big:g,small:g}}
function stay(g){if(!confirm("Odjąć tekstylia dla pobytu: "+g+" gości?"))return;let u=use(g);Object.keys(u).forEach(k=>T[k]=Math.max(0,T[k]-u[k]));addH("Pobyt: "+g+" gości. Odjęto tekstylia i ręczniki.");render()}
function laundry(){if(!confirm("Przywrócić pełny stan tekstyliów po pralni?"))return;TD.forEach(i=>T[i[0]]=i[2]);addH("Odebrano z pralni — pełny stan tekstyliów.");render()}
function doneClean(){addH("Sprzątanie wykonane.");render()}
function cls(q,m){return q<=m?"bad":q<=m+2?"mid":"ok"}
function render(){
let a=document.getElementById("alert"), n=f4(); if(n<=1){a.className="notice red card";a.innerHTML="🚨 WYŚLIJ PRANIE<br><span class='small'>Został "+n+" pełny komplet dla 4 osób</span>"} else if(n===2){a.className="notice yellow card";a.innerHTML="⚠️ Kończy się zapas<br><span class='small'>Zostały 2 pełne komplety dla 4 osób</span>"} else {a.className="notice green card";a.innerHTML="✅ Zapas OK<br><span class='small'>"+n+" kompletów dla 4 osób / "+f2()+" dla 2 osób</span>"}
document.getElementById("summary").innerHTML="<div class='row'><div class='name'>Komplety dla 4 osób</div><div class='qty'>"+f4()+"</div></div><div class='row'><div class='name'>Komplety dla 2 osób</div><div class='qty'>"+f2()+"</div></div>";
document.getElementById("textiles").innerHTML=TD.map(i=>"<div class='row'><div><div class='name'>"+i[1]+"</div><div class='small'>Minimum: "+i[3]+"</div></div><div class='qty "+cls(T[i[0]],i[3])+"'>"+T[i[0]]+"</div></div>").join("");
document.getElementById("supplies").innerHTML=SD.map(i=>"<div class='row'><div><div class='name'>"+i[1]+"</div><div class='small'>Minimum: "+i[3]+"</div></div><div class='qty "+cls(S[i[0]],i[3])+"'>"+S[i[0]]+"</div></div>").join("");
document.getElementById("editTextiles").innerHTML=TD.map(i=>"<div class='row'><div class='name'>"+i[1]+"</div><input id='t_"+i[0]+"' type='number' value='"+T[i[0]]+"'></div>").join("");
document.getElementById("editSupplies").innerHTML=SD.map(i=>"<div class='row'><div class='name'>"+i[1]+"</div><input id='s_"+i[0]+"' type='number' value='"+S[i[0]]+"'></div>").join("");
document.getElementById("hist").innerHTML=H.length?H.map(x=>"<div class='row'><div class='small'>"+x+"</div></div>").join(""):"<div class='small'>Brak historii.</div>";
}
function saveTextiles(){TD.forEach(i=>T[i[0]]=Number(document.getElementById("t_"+i[0]).value||0));addH("Ręczna korekta tekstyliów.");render()}
function saveSupplies(){SD.forEach(i=>S[i[0]]=Number(document.getElementById("s_"+i[0]).value||0));addH("Ręczna korekta zapasów.");render()}
function saveNote(){let v=document.getElementById("note").value.trim();if(v){addH("Notatka: "+v);document.getElementById("note").value="";render()}}
function resetAll(){if(!confirm("Na pewno zresetować wszystko?"))return;localStorage.clear();T=load("T",TD);S=load("S",SD);H=[];addH("Reset aplikacji.");render()}
function tab(s,b){["home","stock","edit","history"].forEach(x=>document.getElementById(x).classList.toggle("hidden",x!==s));["bh","bs","be","bhi"].forEach(x=>document.getElementById(x).classList.toggle("active",x===b));render()}
render();
</script>
</body>
</html>
